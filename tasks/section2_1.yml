---
# tasks file for ansible-cis-ubuntu-2204

# ------------------------------------------------------------------------------

- name: "SECTION2 | 2.1.1-20 | Ensure services are not in use | check if service available"
  ansible.builtin.shell: |
    set -o pipefail &&
    systemctl show {{ outer_item.service }} | grep LoadState | cut -d = -f 2
  args:
    executable: "{{ cis_ubuntu2204_shell_executable }}"
  register: service_status_check_loop_2_1
  changed_when: false
  check_mode: false
  when:
    - outer_item.service is defined
    - outer_item.disable | bool

- name: "SECTION2 | 2.1.1-20 | Ensure services are not in use | disable and mask service"
  ansible.builtin.systemd:
    name: "{{ outer_item.service }}"
    daemon_reload: true
    enabled: false
    masked: true
    state: stopped
  when:
    - outer_item.service is defined
    - service_status_check_loop_2_1.stdout == "loaded"
    - outer_item.disable | bool

- name: "SECTION2 | 2.1.1-20 | Ensure services are not in use | purge service"
  ansible.builtin.apt:
    name: "{{ outer_item.apt }}"
    state: absent
    purge: true
  when:
    - outer_item.apt is defined
    - outer_item.remove | bool
